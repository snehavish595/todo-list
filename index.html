<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
            <span>📝</span> Task Manager
        </h1>

        <div class="flex flex-col gap-3 mb-6">
            <div class="flex gap-2">
                <input type="text" id="taskInput" placeholder="Add a new task..." 
                    class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="addBtn" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                    Add
                </button>
            </div>
            
            <div class="flex gap-2 items-center text-sm text-slate-600">
                <span>Tag:</span>
                <select id="categorySelect" class="bg-slate-50 border border-slate-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <option value="Work">💼 Work</option>
                    <option value="Personal">🏠 Personal</option>
                    <option value="Urgent">🔥 Urgent</option>
                </select>
            </div>
        </div>

        <ul id="taskList" class="space-y-3">
            </ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const categorySelect = document.getElementById('categorySelect');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // Function to create a new task element
        function addTask() {
            const taskText = taskInput.value.trim();
            const category = categorySelect.value;

            if (taskText === '') {
                alert('Please enter a task!');
                return;
            }

            // Create list item
            const li = document.createElement('li');
            li.className = "flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-lg group hover:border-slate-300 transition-colors";

            // Define tag color based on selection
            let tagColor = "bg-blue-100 text-blue-800";
            if (category === "Personal") tagColor = "bg-green-100 text-green-800";
            if (category === "Urgent") tagColor = "bg-red-100 text-red-800";

            // Structure the inner HTML
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <input type="checkbox" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer checkbox-btn">
                    <span class="text-slate-700 task-text">${taskText}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full font-medium ${tagColor}">${category}</span>
                </div>
                <button class="text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 delete-btn">
                    🗑️
                </button>
            `;

            // Add event listener to the checkbox (Toggle Strike-through)
            const checkbox = li.querySelector('.checkbox-btn');
            checkbox.addEventListener('change', function() {
                const text = li.querySelector('.task-text');
                if (this.checked) {
                    text.classList.add('line-through', 'text-slate-400');
                } else {
                    text.classList.remove('line-through', 'text-slate-400');
                }
            });

            // Add event listener to the delete button
            const deleteBtn = li.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', function() {
                li.remove();
            });

            // Append to list and clear input
            taskList.appendChild(li);
            taskInput.value = '';
        }

        // Event Listeners
        addBtn.addEventListener('click', addTask);
        
        // Allow pressing "Enter" to add task
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
