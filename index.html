<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
            <span>📝</span> Task Manager
        </h1>

        <div class="flex flex-col gap-3 mb-6">
            <div class="flex gap-2">
                <input type="text" id="taskInput" placeholder="Add a new task..." 
                    class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="addBtn" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                    Add
                </button>
            </div>
            
            <div class="flex justify-between items-center text-sm">
                <div class="flex gap-2 items-center text-slate-600">
                    <span>Tag:</span>
                    <select id="categorySelect" class="bg-slate-50 border border-slate-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        <option value="Work">💼 Work</option>
                        <option value="Personal">🏠 Personal</option>
                        <option value="Urgent">🔥 Urgent</option>
                    </select>
                </div>
                <button id="clearAllBtn" class="text-red-500 hover:text-red-700 font-medium transition-colors hidden">
                    Clear All
                </button>
            </div>
        </div>

        <ul id="taskList" class="space-y-3">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
